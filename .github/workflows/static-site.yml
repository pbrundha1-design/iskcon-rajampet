name: Validate and Deploy Static Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate website files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: find . -maxdepth 3 -type f | sort

      - name: Check required entry files
        shell: bash
        run: |
          required_files=(
            "index.html"
            "assets/css/styles.css"
            "assets/js/main.js"
          )

          missing=0
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "::error file=$file::Required file is missing"
              missing=1
            else
              echo "Found $file"
            fi
          done

          exit "$missing"

      - name: Scan HTML links and assets
        shell: python
        run: |
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import unquote, urlparse

          root = Path(".").resolve()
          html_files = sorted(root.rglob("*.html"))
          ignored_schemes = {"http", "https", "mailto", "tel", "javascript", "data"}
          missing = []

          class LinkParser(HTMLParser):
              def __init__(self, source):
                  super().__init__()
                  self.source = source

              def handle_starttag(self, tag, attrs):
                  for name, value in attrs:
                      if name not in {"href", "src"} or not value:
                          continue

                      parsed = urlparse(value)
                      if parsed.scheme in ignored_schemes or value.startswith("#"):
                          continue

                      path = unquote(parsed.path)
                      if not path:
                          continue

                      target = (root / path.lstrip("/")) if path.startswith("/") else (self.source.parent / path)
                      if not target.exists():
                          missing.append((self.source.relative_to(root), value))

          for html_file in html_files:
              parser = LinkParser(html_file)
              parser.feed(html_file.read_text(encoding="utf-8", errors="replace"))

          if missing:
              for source, link in missing:
                  print(f"::error file={source}::Missing local file referenced by {link}")
              raise SystemExit(1)

          print(f"Checked {len(html_files)} HTML file(s). No missing local assets found.")

  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4
